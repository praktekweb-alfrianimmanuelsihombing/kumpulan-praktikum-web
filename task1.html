<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <title>Formulir Pengguna ST Bhinneka</title>
</head>

<body>

    <center>

        <table border="1" width="800" cellpadding="5" cellspacing="0">
            <tr>
                <td>

                    <a href="https://satyaterrabhinneka.ac.id/" target="_blank">
                        <img src="https://satyaterrabhinneka.ac.id/assets/img/logo-universitas-satya-terra-bhinneka.png"
                            width="380" alt="Logo ST Bhinneka">
                    </a>

                    <h2>Menu Navigasi</h2>

                    <ul>
                        <li>
                            <a href="https://satyaterrabhinneka.ac.id/" target="_blank">
                                Beranda
                            </a>
                        </li>

                        <li>
                            <a href="https://satyaterrabhinneka.ac.id/profil/visi-misi/" target="_blank">
                                Tentang Kami
                            </a>
                        </li>

                        <li>
                            <a href="https://satyaterrabhinneka.ac.id/kontak/" target="_blank">
                                Hubungi Kami
                            </a>
                        </li>
                    </ul>

                    <h2>Formulir Pengguna</h2>

                    <form>

                        <table border="0" width="100%">
                            <tr>

                                <td width="62%" valign="top">

                                    Nama:<br>
                                    <input type="text" size="30">
                                    <br><br>

                                    Email:<br>
                                    <input type="email" size="30">
                                    <br><br>

                                    Password:<br>
                                    <input type="password" size="30">
                                    <br><br>

                                    Alamat:<br>
                                    <textarea rows="5" cols="48"></textarea>
                                    <br><br>

                                    <input type="submit" value="Submit">

                                </td>

                                <td width="38%" valign="middle">

                                    Jenis Kelamin:<br>

                                    <input type="radio" name="jk">
                                    Laki-laki
                                    <br>

                                    <input type="radio" name="jk">
                                    Perempuan

                                    <br><br>

                                    Hobi:<br>

                                    <input type="checkbox">
                                    Olahraga
                                    <br>

                                    <input type="checkbox">
                                    Musik
                                    <br>

                                    <input type="checkbox">
                                    Membaca

                                </td>

                                <td valign="middle">

                                    Usia:<br>
                                    <input type="number" size="6">

                                    <br><br>

                                    Pilih Gambar:<br>
                                    <input type="file">

                                    <br><br>

                                    Tanggal Lahir:<br>
                                    <input type="date">

                                </td>

                            </tr>
                        </table>

                    </form>

                </td>
            </tr>
        </table>

    </center>

</body>

</html>
